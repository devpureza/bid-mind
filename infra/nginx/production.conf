# =============================================================================
# BidMind · Nginx · production
# Copiar para /etc/nginx/sites-available/bidmind e linkar em sites-enabled.
# SSL gerenciado pelo Certbot (Let's Encrypt). Após o primeiro `certbot --nginx`,
# este arquivo passa a refletir a config final emitida pelo Certbot.
# =============================================================================

upstream bidmind_web {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream bidmind_api {
    server 127.0.0.1:3001;
    keepalive 32;
}

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name bidmind.com.br www.bidmind.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://bidmind.com.br$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bidmind.com.br;

    # Certificados — gerenciados pelo Certbot
    ssl_certificate     /etc/letsencrypt/live/bidmind.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bidmind.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 200m;          # uploads de edital (RF-03)
    proxy_read_timeout   120s;
    proxy_send_timeout   120s;
    proxy_connect_timeout 10s;

    # Headers de segurança (RNF-03)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff"   always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # Compressão básica (CSS, JS, JSON)
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location /api/ {
        proxy_pass         http://bidmind_api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    location / {
        proxy_pass         http://bidmind_web;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}
