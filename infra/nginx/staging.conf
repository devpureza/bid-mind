# =============================================================================
# BidMind · Nginx · staging
# Copiar para /etc/nginx/sites-available/bidmind e linkar em sites-enabled.
# Web e API rodam em containers Docker (rede `bidmind`); Nginx do host fala
# com eles via portas publicadas no docker-compose (ou via socket interno).
#
# Para staging usamos Let's Encrypt em domínio staging.bidmind.com.br.
# Inicialmente, sem SSL — depois rodar `certbot --nginx -d staging.bidmind.com.br`.
# =============================================================================

upstream bidmind_web {
    server 127.0.0.1:3000;
    keepalive 16;
}

upstream bidmind_api {
    server 127.0.0.1:3001;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name staging.bidmind.com.br;

    client_max_body_size 200m;          # uploads de edital (RF-03)
    proxy_read_timeout   120s;
    proxy_send_timeout   120s;
    proxy_connect_timeout 10s;

    # Headers de segurança básicos (refinados em POLISH-02)
    add_header X-Frame-Options       "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff"   always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    # API
    location /api/ {
        proxy_pass         http://bidmind_api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    # Web (Next.js)
    location / {
        proxy_pass         http://bidmind_web;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}
